name: backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/inference/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/inference/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: latest

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Create venv
        run: uv venv .venv --python 3.10

      - name: Install backend (with dev deps)
        run: uv pip install --python .venv/bin/python -e "apps/inference[dev]"

      - name: Install open-iris (SERVER profile)
        run: |
          IRIS_ENV=SERVER uv pip install --python .venv/bin/python \
            "git+https://github.com/worldcoin/open-iris.git"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-open-iris-${{ hashFiles('apps/inference/pyproject.toml') }}-v1

      - name: Run tests
        env:
          # Quoted because the colons in sqlite:///:memory: confuse YAML.
          TANIK_DB_URL: "sqlite:///:memory:"
        run: .venv/bin/pytest apps/inference/tests -v
