name: backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/inference/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/inference/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenJDK 17
        # Required by JPype for the SourceAFIS binding (fingerprint_engine).
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install uv
        # Pinned to a specific tag — astral-sh/setup-uv stopped publishing
        # moving major-version tags after v7 ("immutable releases" change).
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Create venv
        run: uv venv .venv --python 3.10

      - name: Install backend (with dev deps)
        run: uv pip install --python .venv/bin/python -e "apps/inference[dev]"

      - name: Install open-iris (SERVER profile)
        run: |
          IRIS_ENV=SERVER uv pip install --python .venv/bin/python \
            "git+https://github.com/worldcoin/open-iris.git"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-open-iris-${{ hashFiles('apps/inference/pyproject.toml') }}-v1

      - name: Run tests
        id: pytest
        env:
          # Quoted because the colons in sqlite:///:memory: confuse YAML.
          TANIK_DB_URL: "sqlite:///:memory:"
        run: .venv/bin/pytest apps/inference/tests -v --tb=short --color=no 2>&1 | tee /tmp/pytest.log

      - name: Surface failure context as workflow annotations
        if: failure() && steps.pytest.outcome == 'failure'
        # Anonymous (public-repo) consumers can read check-run annotations but
        # not raw run logs, so we promote the most actionable lines (FAILED:
        # markers and traceback summaries) to ::error:: lines. They show up
        # on the public run page and via the check-runs annotations API.
        run: |
          echo "::group::Final 120 lines of pytest output"
          tail -120 /tmp/pytest.log
          echo "::endgroup::"
          grep -E '^(FAILED|ERROR|E +|tanik_inference|>.*assert)' /tmp/pytest.log | head -40 | while IFS= read -r line; do
            # ::error:: lines truncate at ~1000 chars; keep them tight
            printf '::error::%s\n' "${line:0:500}"
          done
